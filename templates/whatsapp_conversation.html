<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body {
    font-family: 'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    width: 390px;
    background: #EFEAE2;
    color: #111B21;
    direction: rtl;
    overflow: hidden;
  }
  /* ====== Status Bar ====== */
  .status-bar {
    background: #008069;
    height: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 14px;
    font-size: 12px;
    color: #FFFFFF;
    font-weight: 600;
  }
  /* ====== Header ====== */
  .header {
    background: #008069;
    height: 56px;
    display: flex;
    align-items: center;
    padding: 0 8px;
    gap: 8px;
  }
  .back-arrow {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #FFFFFF;
  }
  .back-arrow svg { width: 20px; height: 20px; fill: #FFFFFF; }
  .header-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    flex-shrink: 0;
    text-transform: uppercase;
  }
  .header-info {
    flex: 1;
    min-width: 0;
  }
  .header-name {
    font-size: 16px;
    font-weight: 600;
    color: #FFFFFF;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .header-status {
    font-size: 13px;
    color: #B3D9D0;
  }
  .header-actions {
    display: flex;
    gap: 20px;
    align-items: center;
  }
  .header-actions svg { width: 22px; height: 22px; fill: #FFFFFF; }
  /* ====== Chat Area ====== */
  .chat-area {
    background: #EFEAE2;
    padding: 10px 12px;
    min-height: 400px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(0,0,0,0.03) 1px, transparent 1px),
      radial-gradient(circle at 70% 60%, rgba(0,0,0,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  /* Date separator */
  .date-separator {
    display: flex;
    justify-content: center;
    margin: 10px 0;
  }
  .date-pill {
    background: #FFFFFF;
    color: #667781;
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 8px;
    box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
  }
  /* Message bubble */
  .message {
    max-width: 75%;
    padding: 8px 10px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.4;
    position: relative;
    margin-bottom: 2px;
    word-wrap: break-word;
    box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
  }
  .message.incoming {
    align-self: flex-start;
    background: #FFFFFF;
    border-top-left-radius: 2px;
  }
  .message.outgoing {
    align-self: flex-end;
    background: #D9FDD3;
    border-top-right-radius: 2px;
  }
  .message-sender {
    font-size: 12px;
    font-weight: 600;
    color: #25d366;
    margin-bottom: 2px;
  }
  .message-text {
    color: #111B21;
  }
  .message-time {
    font-size: 11px;
    color: #667781;
    float: left;
    margin-top: 2px;
    margin-left: 8px;
  }
  .message.outgoing .message-time::after {
    content: " ✓✓";
    color: #53BDEB;
  }
  /* System message */
  .system-message {
    align-self: center;
    background: #FFFFFF;
    color: #667781;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 8px;
    margin: 8px 0;
    text-align: center;
    max-width: 85%;
    box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
  }
  /* ====== Input Bar ====== */
  .input-bar {
    background: #F0F2F5;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: fixed;
    bottom: 0;
    width: 390px;
  }
  .input-field {
    flex: 1;
    background: #FFFFFF;
    border-radius: 24px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    color: #667781;
    font-size: 14px;
  }
  .input-field svg { width: 20px; height: 20px; fill: #667781; }
  .input-icons {
    display: flex;
    gap: 15px;
  }
  .input-icons svg { width: 24px; height: 24px; fill: #667781; }
  .send-button {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #00A884;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .send-button svg { width: 22px; height: 22px; fill: #FFFFFF; }
</style>
</head>
<body>
  <div class="status-bar">
    <span>9:41</span>
    <span>•••</span>
  </div>
  <div class="header">
    <div class="back-arrow">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </div>
    <div class="header-avatar" id="header-avatar"></div>
    <div class="header-info">
      <div class="header-name" id="header-name"></div>
      <div class="header-status">متصل الآن</div>
    </div>
    <div class="header-actions">
      <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M12 8c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    </div>
  </div>
  <div class="chat-area" id="chat-area">
    <!-- messages will be inserted here by Python -->
  </div>
  <div class="input-bar">
    <div class="input-field">
      <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>
      <span>اكتب رسالة</span>
    </div>
    <div class="input-icons">
      <svg viewBox="0 0 24 24"><path d="M14.5 5.5c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>
    </div>
    <div class="send-button">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </div>
  </div>
</body>
</html>
